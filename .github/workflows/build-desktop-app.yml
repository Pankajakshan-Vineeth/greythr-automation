name: Build desktop app

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install agent-flat dependencies
        working-directory: agent-flat
        run: npm install

      - name: Install Playwright Chromium into agent-flat
        working-directory: agent-flat
        env:
          # Install Chromium into agent-flat/node_modules/playwright/.local-browsers/
          # so electron-builder bundles it together with agent-flat itself.
          PLAYWRIGHT_BROWSERS_PATH: '0'
        run: npx playwright install chromium

      - name: Install desktop-app dependencies
        working-directory: desktop-app
        run: npm install

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: desktop-app
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: desktop-app
        run: npm run build:win

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: desktop-app
        run: npm run build:linux

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            desktop-app/build/*.dmg
            desktop-app/build/*.exe
            desktop-app/build/*.AppImage
          if-no-files-found: ignore
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) -exec cp {} release-files/ \;
          ls -la release-files/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## GreytHR Automation Desktop App ${{ github.ref_name }}

            Download the installer for your operating system:
            - **macOS** -> `.dmg`
            - **Windows** -> `.exe` (named "Setup")
            - **Linux** -> `.AppImage`

            See the README for one-time install instructions including how to handle the unsigned-app warnings on first launch.
